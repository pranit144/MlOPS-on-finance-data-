name: Stock Data Pipeline

on:
  schedule:
    - cron: "0 0 15 * *"   # Runs at 00:00 UTC on the 15th of every month
  workflow_dispatch:         # Allows manual trigger from GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repository so the workflow can read/write files
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Set up the Python version
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install required Python libraries
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the data-fetch script (writes/updates data/stock_data.csv)
      - name: Run data script
        run: python scripts/fetch_stock_data.py

      # 5. Commit the updated CSV back to the repository
      - name: Commit and push updated data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_data.csv
          # Commit only if there are changes (avoids error on empty diff)
          git diff --cached --quiet || git commit -m "chore: auto-update stock data [skip ci]"
          git push
